<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const tulips = [];
    const tulipCount = 40; // Jumlah bunga tulip
    const text = "🌷"; // Mengganti tulisan dengan bunga tulip

    // Rumus Matematika Jantung
    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x, y };
    }

    // Inisialisasi posisi bunga
    for (let i = 0; i < tulipCount; i++) {
        tulips.push({
            t: (i / tulipCount) * Math.PI * 2,
            size: Math.random() * 10 + 15, // Ukuran bunga
        });
    }

    function draw() {
        // --- Efek Jejak (Trail) Transparan ---
        // Ini memastikan canvas tidak berubah jadi hitam, melainkan menghapus bayangan secara perlahan
        // sehingga gambar background CSS di belakangnya tetap terlihat permanen.
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 20; // Ukuran besar kecilnya jantung

        // 1. Menggambar Hati (Bunga Tulip)
        tulips.forEach(tulip => {
            const pos = getHeartPoint(tulip.t);
            const x = centerX + pos.x * scale;
            const y = centerY + pos.y * scale;

            ctx.shadowBlur = 0; // Pastikan tulip tidak bersinar

            ctx.font = `${tulip.size}px serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            ctx.fillText(text, x, y);

            // Pergerakan lambat
            tulip.t += 0.002; 
        });

        // 2. Menambahkan Teks yang Lebih Elegan di Tengah
        ctx.font = "italic bold 40px 'Georgia', serif"; 
        ctx.fillStyle = "#ffb6c1"; 
        
        ctx.shadowColor = "#ffb6c1";
        ctx.shadowBlur = 15; 
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("I Love U Salma", centerX, centerY);

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    draw();
</script>
</body>
</html>
